            * Mammal Diversity Database. (2020). Mammal Diversity Database (Version 1.2) [Data set]. Zenodo. DOI:
            [10.5281/zenodo.4139818](https://doi.org/10.5281/zenodo.4139818).<br>

            * Map of Life. (2021). Mammal range maps harmonised to the Mammals Diversity Database [Data set]. Map of
            Life. [10.48600/MOL-48VZ-P413](https://doi.org/10.48600/MOL-48VZ-P413)
          content:
            application/json:
              schema:
