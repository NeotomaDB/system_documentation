  /v2.0/data/summary/dsdbmonth:
    get:
      description: 'Returns summary statistics for the database as a whole, broken down by constituent database.'
      parameters:
        - description: The starting month (from present == 0) for which to generate the summary.
          example: 0
          in: query
          name: start
          required: true
          schema:
            default: 0
            maximum: 9999
            minimum: 0
            type: integer
        - description: The ending month (from present == 0) for which to generate the summary.
          example: 1
          in: query
          name: end
          required: true
          schema:
            default: 1
            maximum: 9999
            minimum: 0
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/summarydatabase'
          description: A count of the datasets added by database for the requested period.
      summary: Summary Information
      tags:
        - Summary Information
        - v2.0
  /v2.0/data/summary/dstypemonth:
    get:
      description: 'Returns summary statistics for the database as a whole, broken down by dataset type.'
      parameters:
        - description: The starting month (from present == 0) for which to generate the summary.
          example: 0
          in: query
          name: start
          required: true
          schema:
            default: 0
            type: integer
        - description: The ending month (from present == 0) for which to generate the summary.
          example: 1
          in: query
          name: end
          required: true
          schema:
            default: 1
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/summarydatatype'
          description: A count of the datasets added by datasettype for the requested period.
      summary: Summary Information
      tags:
        - Summary Information
        - v2.0
  /v2.0/data/summary/rawbymonth:
    get:
      description: >-
        Returns the count of sites, datasets, publications and other objects added to Neotoma during the requested time
        period.
      parameters:
        - description: The starting month (from present == 0) for which to generate the summary.
          example: 0
          in: query
          name: start
          required: true
          schema:
            default: 0
            type: integer
        - description: The ending month (from present == 0) for which to generate the summary.
          example: 1
          in: query
          name: end
          required: true
          schema:
            default: 1
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/summaryalldata'
          description: A count of the data objects added to Neotoma.
      summary: Summary Information
      tags:
        - Summary Information
        - v2.0
  /v2.0/data/taxa:
    get:
      description: Returns information about a taxon and (if requested) related taxa.
      parameters:
        - $ref: '#/components/parameters/taxonNameQuery'
        - $ref: '#/components/parameters/taxaGroupQuery'
        - $ref: '#/components/parameters/ecolGroupQuery'
        - $ref: '#/components/parameters/taxastatusQuery'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/taxa'
          description: A taxon or array of taxa.
      summary: Taxonomic information.
      tags:
        - Taxonomic metadata
        - v2.0
  '/v2.0/data/taxa/{taxonid}':
    get:
      description: Returns information about a taxon and (if requested) related taxa.
      parameters:
        - $ref: '#/components/parameters/taxonidPath'
      responses:
        '200':
          content:
            application/json:
              schema:
