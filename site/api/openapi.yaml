    sitedescription:
      example: >-
        Lake is located in a pre-glacial gorge of the Wisconsin river cut through the Baraboo Hills, a bedrock high. The
        valley is dammed at both ends by terminal moraines deposited by the Green Bay lobe, which flowed around the
        Baraboo Hills. Lake is fed by groundwater. Surrounding vegetation, white-black-bur oak.
      nullable: true
      type: string
    siteid:
      description: >
        A unique integer site identifier used internally within the Neotoma Database as a primary key for the
        `ndb.sites` data table, and as a foreign key in many other tables that relate to the sites table.
      example: 666
      format: int64
      minimum: 1
      type: integer
    sitename:
      description: >
        A non-unique name for the site. This may be inherited from the location (a lake name for example), or may be an
        author generated name, as used in a publication. There is no standardization for site names in Neotoma.
      example: Devils Lake
      type: string
    sitenotes:
      description: |
        An open text field used to describe additional information about the site.
      example: This record has some little things that seem funny about it.
      nullable: true
      type: string
