openapi: 3.0.0
info:
  title: Neotoma API
  version: 2.0-oas3
  description: >-
    Neotoma is funded by the *National Sciences Foundation* of the United States ([Award
    1948962](https://nsf.gov/awardsearch/showAward?AWD_ID=1948926)).


    The [Neotoma Paleoecology Database](https://www.neotomadb.org) is a global database of fossils  from the last 5.2
    million years. All fossil records in Neotoma are reported with metadata that  places the sample in space and in
    time, and provides additional information about taxonomy,  publication history, and the models that are used to
    estimate the sample age.

    The API is structured to provide users with reliable JSON responses from the live Neotoma Database.  Neotoma
    provides several tools to work with researcher submitted data:

      * [Neotoma Explorer](https://apps.neotomadb.org/explorer): A visual, interactive data explorer.
      * [neotoma2 R package](https://cran.r-project.org/web/packages/neotoma2/index.html): A tool for obtaining and manipulating paleoecological data in R.
      
      <a href=https://localcontextshub.org/institutions/view/122/><img alt="Local Contexts Open to Collaborate Logo" src=https://storage.googleapis.com/local-contexts-hub.appspot.com/labels/notices/ci-open-to-collaborate.svg width=50 style="align:center;"/></a>
      <p>Our institution is committed to the development of new modes of collaboration, engagement, and partnership with Indigenous peoples for the care and stewardship of past and future heritage collections.
  contact:
    name: Simon J Goring
    email: goring@wisc.edu
    url: 'http://goring.org'
  license:
    name: MIT
    url: 'https://opensource.org/licenses/MIT'
servers:
  - description: The Neotoma production server.
    url: 'https://api.neotomadb.org/'
  - description: Neotoma development server.
    url: 'https://api-dev.neotomadb.org/'
  - description: A local Neotoma server.
    url: 'http://localhost:3001/'
components:
  parameters:
    dbidQuery:
      description: >
        Unique constituent database identifier from the `ndb.constituentdatabases` table. Each of the Neotoma
        constituent databases is identified uniquely with an integer primary key.
      in: query
      name: dbid
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 35
    ageQuery:
      description: |
        Ice-sheet age (in calibrated radiocarbon years before present, with 0 at 1950CE). Ages range from 0 to 18000.
      in: query
      name: age
      required: false
      schema:
        example: 6700
        format: int64
        maximum: 18000
        minimum: 1000
        type: integer
    ageOfQuery:
      description: 'Dataset age ranges must span this age (in calibrated years before present, with 0 at 1950CE)'
      in: query
      name: ageof
      required: false
      schema:
        example: 6700
        format: int64
        maximum: 23900000
        minimum: -100
        type: integer
    scinameQuery:
      description: The scientific name for a mammal taxon. May be the complete name or use the `%` wildcard for the name.
      in: query
      name: sciname
      required: true
      schema:
        example: canis%
        type: string
    projQuery:
      in: query
      name: proj
      required: false
      schema:
        type: integer
        minimum: 2000
        maximum: 32767
        default: 4326
        example: 3857
      description: >
        A valid integer [spatial reference
        identifier](https://en.wikipedia.org/wiki/Spatial_reference_system#Identifier) value. By default Neotoma returns
        all data with the SRID 4326 (standard lat/long), representing the
        [WSG84](https://en.wikipedia.org/wiki/World_Geodetic_System#WGS84) model of the planet. For web mapping users
        may choose SRID *3857* if using projected features.
    precQuery:
      description: >-
        Precision of points within a rendered polygon. Many spatial objects are generated statistically and may have
        overly precise point coordinates. Often precisions to 100m is sufficient for rendering to map.<br> **NOTE**: the
        precision is dependent on the projected units. For the default SRID=4326 projection, precision units are in
        decimal degrees, where 0.1 degrees latitude = 11.1km and 0.0001 degrees latitude = 11.1m. For metric precision,
        units will be in meters.<br>The default value of *0.0001* represents a metric distance of 11.1m in the default
        4326 projection.
      in: query
      name: prec
      required: false
      schema:
        example: 100
        minimum: 0
        maximum: 1000
        exclusiveMinimum: true
        type: number
        default: 0.0001
    ageOldQuery:
      description: 'Oldest age that intercepts with the dataset (in calibrated years before present, with 0 at 1950CE)'
      in: query
      name: ageold
      required: false
      schema:
        example: 11430
        format: int64
        maximum: 23900000
        minimum: -100
        type: integer
    ageYoungQuery:
      description: 'Youngest age that intercepts with the dataset (in calibrated years before present, with 0 at 1950CE)'
      in: query
      name: ageyoung
      required: false
      schema:
        example: -60
        format: int64
        maximum: 23900000
        minimum: -100
        type: integer
    altMaxQuery:
      description: Maximum altitude of the dataset site location (in meters)
      in: query
      name: altmax
      required: false
      schema:
        example: 60
        format: int64
        maximum: 8900
        minimum: -500
        type: integer
    altMinQuery:
      description: Minimum altitude of the dataset site location (in meters)
      in: query
      name: altmin
      required: false
      schema:
        example: 40
        format: int64
        maximum: 8900
        minimum: -500
        type: integer
    datasetidPath:
      description: >-
        A valid datasetid identifer from the Neotoma database. This is the internal identifier within the
        [`ndb.datasets`](https://open.neotomadb.org/dbschema/ndb/tables/datasets.html) table.
      in: path
      name: datasetid
      required: true
      schema:
        format: int64
        type: integer
        minimum: 0
        exclusiveMinimum: true
    collectionunitidQuery:
      description: >-
        A valid collection unit identifer from the Neotoma database. This is the internal identifier within the
        [`ndb.collectionunits`](https://open.neotomadb.org/dbschema/ndb/tables/collectionunits.html) table. If the
        collection unit ID contains no speleothem data, then the result will be an empty dataset.
      in: query
      name: collectionunitid
      required: true
      schema:
        format: int64
        type: integer
        minimum: 0
        maximum: 70000
        exclusiveMinimum: true
    collectionunitidPath:
      description: >-
        A valid collection unit identifer from the Neotoma database. This is the internal identifier within the
        [`ndb.collectionunits`](https://open.neotomadb.org/dbschema/ndb/tables/collectionunits.html) table. If the
        collection unit ID contains no speleothem data, then the result will be an empty dataset.
      in: path
      name: collectionunitid
      required: true
      schema:
        format: int64
        type: integer
        minimum: 0
        maximum: 70000
        exclusiveMinimum: true
    chronidPath:
      description: >-
        Unique chronology identifier. This is the internal identifier within the
        [`ndb.chronologies`](https://open.neotomadb.org/dbschema/ndb/tables/chronologies.html) table. Note that although
        the chronology IDs are generated sequentially, not all chronology IDs are currently in use.
      in: path
      name: chronid
      required: true
      schema:
        format: int64
        example: 17
        maximum: 44000
        minimum: 0
        exclusiveMinimum: true
        type: integer
    contactNameQuery:
      description: >-
        Full name of the researcher using the "Last, Given Name(s)" structure. You may use the % wildcard anywhere in
        the string.
      in: query
      name: contactname
      required: false
      schema:
        example: 'Grimm, Eric Christopher'
        type: string
        pattern: '^[-''a-zA-ZÀ-ÖØ-öø-ÿ, ]+$'
    countQuery:
      description: Should we return the row count for the table?
      in: query
      name: count
      required: false
      schema:
        type: boolean
        default: false
    contactStatusQuery:
      description: Current employment status
      in: query
      name: contactstatus
      required: false
      schema:
        enum:
          - active
          - deceased
          - defunct
          - extant
          - inactive
          - retired
          - unknown
        example: deceased
        type: string
    contactidPath:
      description: 'Unique contact identifier within the Neotoma Database, alone or comma separated.'
      in: path
      name: contactid
      required: true
      schema:
        example: 44
        format: int64
        maximum: 21000
        minimum: 1
        type: integer
    contactidQuery:
      description: 'Unique contact identifier within the Neotoma Database, alone or comma separated.'
      in: query
      name: contactid
      required: false
      schema:
        example: 44
        format: int64
        maximum: 21000
        minimum: 1
        type: integer
    databaseQuery:
      description: One of the constituent databases within Neotoma
      in: query
      name: database
      required: true
      schema:
        example: European Pollen Database
        enum:
          - Cooperative Holocene Mapping Project
          - African Pollen Database
          - European Pollen Database
          - Indo-Pacific Pollen Database
          - Latin American Pollen Database
          - North American Pollen Database
          - Pollen Database of Siberia and the Russian Far East
          - Canadian Pollen Database
          - FAUNMAP
          - Neotoma
          - North American Plant Macrofossil Database
          - Academy of Natural Sciences of Drexel University
          - NDSU Insect Database
          - North American Non-Marine Ostracode Database Project (NANODe)
          - MioMap
          - Alaskan Archaeofaunas
          - French Institute of Pondicherry Palynology and Paleoecology Database
          - Japanese Pollen Database
          - Neotoma Midden Database
          - Chinese Pollen Database
          - Holocene Perspective on Peatland Biogeochemistry
          - ANTIGUA
          - Neotoma Testate Amoebae Database
          - Deep-Time Palynology Database
          - Neotoma Biomarker Database
          - Alpine Pollen Database
          - Canadian Museum of Nature-Delorme Ostracoda-Surface Samples
          - Diatom Paleolimnology Data Cooperative (DPDC)
          - Neotoma Ostracode Database
          - Faunal Isotope Database
          - Neotoma Charcoal Data
          - Pollen Monitoring Programme
          - PaleoVertebrates of Latin America
          - St. Croix Watershed Research Station of the Science Museum of Minnesota
        type: string
    aggdatasetidPath:
      description: 'Valid Neotoma aggregate dataset identifier (integer), either singly or in a comma separated list.'
      in: path
      name: aggdatasetid
      required: true
      schema:
        example: 100
        format: int32
        maximum: 60000
        minimum: 1
        type: integer
    datasetidQuery:
      description: 'Valid Neotoma dataset identifier (integer), either singly or in a comma separated list.'
      in: query
      name: datasetid
      required: false
      schema:
        format: int32
        minimum: 0
        example: 12
        exclusiveMinimum: true
        type: integer
    doidataQuery:
      description: 'A valid DOI in the form 10.XXXX/XXXXX (i.e., excluding ''https://doi.org'').'
      in: query
      name: doi
      required: false
      schema:
        type: string
        pattern: '^10.\d{4,9}/[-._;()/:A-Z0-9]+$'
        example: 10.21233/znex-sp94
    datasettypeQuery:
      description: >-
        Neotoma contains data for a number of dataset types (see /dbtables/datasettypes.  This returns a subset of data
        types.
      in: query
      name: datasettype
      required: false
      schema:
        type: string
        nullable: true
        example: pollen
        enum:
          - geochronologic
          - loss-on-ignition
          - pollen
          - plant macrofossil
          - vertebrate fauna
          - macroinvertebrate
          - pollen surface sample
          - insect
          - ostracode
          - water chemistry
          - diatom
          - ostracode surface sample
          - diatom surface sample
          - geochemistry
          - physical sedimentology
          - charcoal
          - testate amoebae
          - X-ray fluorescence (XRF)
          - X-ray diffraction (XRD)
          - energy dispersive X-ray spectroscopy (EDS/EDX)
          - biomarker
          - modern plant biomarker
          - phytolith
          - specimen stable isotope
          - 'paleomagnetic,biochemistry'
          - modern biochemistry
          - organic carbon
          - insect modern
          - chironomid
          - stable isotope
          - testate amoebae surface sample
          - charcoal surface sample
          - cladocera
          - diatom top-bottom
          - microcharcoal
          - macrocharcoal
          - pollen trap
          - dinoflagellates
          - diatom bottom sample
          - Metabarcoding aeDNA
    ecolGroupQuery:
      description: The ecological group of interest for the Neotoma taxon (from the Neotoma ecolgrouptypes table)
      in: query
      name: ecolgroup
      required: false
      schema:
        type: string
        example: Charcoal
    familyNameQuery:
      description: Family name (last name) of the the researcher (may use the % wildcard).
      in: query
      name: familyname
      required: false
      schema:
        type: string
        example: Grimm
        pattern: '^[-''a-zA-ZÀ-ÖØ-öø-ÿ% ]+$'
    gpidPath:
      description: Numeric ID for the geopolitical unit.
      in: path
      name: gpid
      required: true
      schema:
        format: int32
        maximum: 11000
        minimum: 1
        type: integer
    gpidQuery:
      description: Numeric ID for the geopolitical unit from the Neotoma geopoliticalunits table.
      in: query
      name: gpid
      required: false
      schema:
        format: int32
        maximum: 11000
        minimum: 1
        type: integer
      examples:
        gpid:
          value: 5392
          summary: A valid unique identifier for geopolitical units from Neotoma's geopoliticalunits table.
        gpids:
          value: '2155,5392,313,5414'
          summary: 'A set of unique identifiers, separated by commas.'
    gpnameQuery:
      description: Name for a geopolitical unit.
      in: query
      name: gpname
      required: false
      schema:
        type: string
      examples:
        countryname:
          value: Canada
          summary: 'The name of a country, state or other region.'
        countrynames:
          value: 'Italy, austria, switzerland'
          summary: 'The name of a set of locations, separated by commas.'
    keywordQuery:
      description: >-
        A valid keyword for samples within Neotoma. The list of valid names can be obtained through a call to the
        dbtables API call.
      in: query
      name: keyword
      required: false
      schema:
        format: string
        enum:
          - modern
          - pre-European
          - interglacial
          - bottom
          - beyond radiocarbon
          - null
    limitParam:
      description: 'The maximum number of records to be returned, default is 25.'
      in: query
      name: limit
      required: false
      schema:
        default: 25
        example: 25
        format: int32
        maximum: 10000
        minimum: 1
        type: integer
    locQuery:
      description: >
        The geographic region of interest for the site, as a GeoJSON string or valid Well Known Text (WKT).  Assumed
        projection of EPSG:4376 unless otherwise defined.
      in: query
      name: loc
      required: false
      schema:
        type: string
      examples:
        MosseGeoJSON:
          value: >-
            {"type":"Polygon","crs":{"type":"name","properties":{"name":"EPSG:4326"}},"coordinates":[[[13.4,55.92],[13.5,55.92],[13.5,55.95],[13.4,55.95],[13.4,55.92]]]}
          summary: A geoJSON representation of a polygon that includes Argentina and Chile.
        EuropeanWKT:
          value: 'POLYGON ((13.4 55.92,13.5 55.92,13.5 55.95,13.4 55.95,13.4 55.92))'
          summary: A WKT formatted spatial polygon that includes land adjacent to the Adriatic sea.
    lowergpQuery:
      description: Should all lower ranked units below the target unit be returned?
      in: query
      name: lower
      required: false
      schema:
        default: false
        type: boolean
    occurrenceidPath:
      description: 'Valid Neotoma occurrence identifier (integer), either singly or in a comma separated list.'
      in: path
      name: occurrenceid
      required: true
      schema:
        format: int32
        maximum: 10000000
        minimum: 1
        type: integer
    occurrenceidQuery:
      description: 'Valid Neotoma occurrence identifier (integer), either singly or in a comma separated list.'
      in: query
      name: occurrenceid
      required: false
      schema:
        format: int32
        maximum: 10000000
        minimum: 0
        type: integer
    offsetParam:
      description: The offset for returned records when a limit is present.  Default is 0.
      in: query
      name: offset
      required: false
      schema:
        default: 0
        example: 25
        format: int32
        minimum: 0
        type: integer
    pollenidPath:
      description: |
        Unique pollen taxon identifier (from the Neotoma taxa table).
      in: path
      name: id
      required: true
      schema:
        format: int32
        maximum: 50000
        minimum: 1
        type: integer
    publicationidPath:
      description: |
        Unique publication identifier (from the Neotoma publication table).
      in: path
      name: publicationid
      required: true
      schema:
        format: int32
        maximum: 20000
        minimum: 1
        type: integer
    publicationidQuery:
      description: |
        Unique publication identifier (from the Neotoma publication table).
      in: query
      name: publicationid
      required: false
      schema:
        format: int32
        maximum: 20000
        minimum: 0
        exclusiveMinimum: true
        type: integer
    pubsearchQuery:
      description: 'A fulltext search string.  Either a literal portion of the article name, or keywords.'
      in: query
      name: search
      required: false
      schema:
        type: string
    pubtypeQuery:
      description: The type of publication requested.
      in: query
      name: pubtype
      required: false
      schema:
        enum:
          - Legacy
          - Journal Article
          - Book Chapter
          - Authored Book
          - Edited Book
          - Master's Thesis
          - Doctoral Dissertation
          - Authored Report
          - Edited Report
          - Other Authored
          - Other Edited
          - Website
          - Undergraduate thesis
        type: string
    pubyearQuery:
      description: 'The year of publication, either as a single value or comma separated string.'
      in: query
      name: year
      required: false
      schema:
        format: int32
        maximum: 2100
        minimum: 1500
        type: integer
    rankQuery:
      description: 'The unit rank.  Ranges from 1 (country) - 4 (e.g., parks).'
      in: query
      name: rank
      required: false
      schema:
        maximum: 4
        minimum: 1
        type: integer
    taxaQuery:
      description: >
        The name of a taxon, or a unique taxon identifier within Neotoma (obtained from a call to tables). May be a
        comma separated list of taxonomic names or numeric identifiers. As elsewhere, the `%` sign can be used as a
        wildcard.
      name: taxa
      in: query
      required: false
      schema:
        type: string
    sitenameQuery:
      description: >-
        Name of the study site (may use the % wildcard). Note that Neotoma study site names are not unique. For example
        there are more than 15 sites in Neotoma named *Clear Lake*.
      in: query
      name: sitename
      required: false
      schema:
        example: Ageröds Mosse
        type: string
    siteidPath:
      description: 'Valid Neotoma site identifier (integer), either singly or in a comma separated list.'
      in: path
      name: siteid
      required: true
      schema:
        format: int32
        maximum: 50000
        minimum: 1
        type: integer
    bufferQuery:
      description: Buffer distance for point of polygon in meters.
      in: query
      name: buffer
      required: false
      schema:
        format: int64
        minimum: 0
        maximum: 10000
        default: 10000
        type: integer
    siteidQuery:
      description: 'Valid Neotoma site identifier (integer), either singly or in a comma separated list.'
      in: query
      name: siteid
      required: false
      schema:
        format: int32
        maximum: 50000
        minimum: 1
        type: integer
        example: 12
    tableQuery:
      description: Valid name for a Neotoma Table
      in: query
      name: table
      required: false
      schema:
        example: agetypes
        type: string
    tablePath:
      description: Valid name for a Neotoma Table
      in: path
      name: table
      required: true
      schema:
        example: agetypes
        type: string
    taxonNameQuery:
      description: >
        Taxon name or partial name. You can pass wildcard characters using `%`. For example, `%anis` will match

        with *Canis* as well as the plant taxon *Triodanis*. It will not match `Canis lupus` because there is no
        terminal wildcard. This can be accompished using `%anis%`.
      in: query
      name: taxonname
      required: false
      schema:
        example: Canis
        type: string
    taxaGroupQuery:
      description: >
        The taxonomic grouping the taxon belongs to, from the Neotoma taxagrouptypes table. You can get the list of
        acceptable taxa group types using the [dbtables API
        call](https://api.neotomadb.org/api-docs/#/Database%20tables/get_v2_0_data_dbtables) and passing
        *taxagrouptypes* as the table.
      in: query
      name: taxagroup
      required: false
      schema:
        example: Algae
        type: string
    taxastatusQuery:
      description: |
        The taxonomic extinction status of the taxon, either extinct (1, True) or extant (0, False).
      in: query
      name: status
      required: false
      schema:
        example: 1
        type: string
        enum:
          - 0
          - 1
          - true
          - false
    taxonidPath:
      description: |
        Unique taxonomic identifier (from the Neotoma taxon table).
      in: path
      name: taxonid
      required: true
      schema:
        format: int32
        maximum: 50000
        minimum: 1
        type: integer
    taxonidQuery:
      description: Unique taxonomic identifier (from the Neotoma taxon table).
      in: query
      name: taxonid
      required: false
      schema:
        maximum: 50000
        minimum: 1
        type: integer
    taxonnameQuery:
      description: Unique taxonomic name (from the Neotoma taxon table).
      in: query
      name: taxonname
      required: false
      schema:
        type: string
  schemas:
    constdbdescription:
      type: string
      nullable: true
      description: >
        A description provided by the stewards for the constituent database describing the database and its intended
        use.
    constdbresponse:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        query:
          type: object
          nullable: true
        data:
          type: array
          items:
            type: object
            properties:
              description:
                $ref: '#/components/schemas/constdbdescription'
              url:
                $ref: '#/components/schemas/url'
              contactname:
                $ref: '#/components/schemas/contactname'
              email:
                $ref: '#/components/schemas/email'
              datasettypes:
                description: |
                  An array of the unique dataset types for all datasets within the constituent database.
                type: array
                items:
                  type: object
                  properties:
                    datasets:
                      type: integer
                    datasettype:
                      type: string
                      nullable: true
                  nullable: true
              older:
                $ref: '#/components/schemas/ageold'
              younger:
                $ref: '#/components/schemas/ageyoung'
              datasets:
                description: |
                  A count of the number of unique datasets within the constituent database.
                type: integer
    datasetagerangeresponse:
      description: >
        The age bounds of a dataset, as defined by the chronology, generally the oldest and youngest sample ages for the
        dataset, for a given age type (<sup>14</sup>C years, calibrated radiocarbon, calendar years, etc.)
      properties:
        status:
          type: string
        message:
          type: string
        query:
          type: object
        data:
          type: array
          items:
            properties:
              older:
                $ref: '#/components/schemas/ageold'
              younger:
                $ref: '#/components/schemas/ageyoung'
              agetype:
                $ref: '#/components/schemas/agetype'
    datasetsShort:
      description: |
        A data response primarily for rapid access to site/dataset locations, providing only limited metadata.
      properties:
        status:
          type: string
        message:
          type: string
        data:
          type: array
          items:
            properties:
              siteid:
                $ref: '#/components/schemas/siteid'
              sitename:
                $ref: '#/components/schemas/sitename'
              datasetid:
                $ref: '#/components/schemas/datasetid'
              datasettype:
                $ref: '#/components/schemas/datasetid'
              coords:
                type: array
                items:
                  type: string
    lakesPoly:
      properties:
        status:
          type: string
        message:
          type: string
        data:
          type: array
          items:
            properties:
              hydrolakeid:
                type: integer
                description: >
                  Unique lake identifier in the [HydroLakes10k](https://www.hydrosheds.org/products/hydrolakes)
                  database.
              lakename:
                type: string
                description: >
                  Name of lake or reservoir.<br>

                  This field is currently only populated for lakes with an area of at least 500km^2^; for large
                  reservoirs where a name was available in the GRanD database; and for smaller lakes where a name was
                  available in the GLWD database. [source
                  PDF](https://data.hydrosheds.org/file/technical-documentation/HydroLAKES_TechDoc_v10.pdf)
              lakearea:
                description: Lake area in square kilometers.
                type: integer
              shorelen:
                description: Shore length/lake perimeter in kilometers.
                type: integer
              volume:
                type: number
                description: >
                  Total lake or reservoir volume, in million cubic meters (1*mcm* = 0.001 km^3^).<br>

                  For most polygons, this value represents the total lake volume as estimated using the geostatistical
                  modeling approach by Messager et al. (2016). However, where either a reported lake volume (for lakes ≥
                  500 km^2^) or a reported reservoir volume (from GRanD database) existed, the total volume represents
                  this reported value. In cases of regulated lakes, the total volume represents the larger value between
                  reported reservoir and modeled or reported lake volume. [source
                  PDF](https://data.hydrosheds.org/file/technical-documentation/HydroLAKES_TechDoc_v10.pdf)
              avgdepth:
                type: number
                description: >
                  Average lake depth, in meters.

                  Average lake depth is defined as the ratio between total lake volume (`volume`) and lake area
                  (`lakearea`).
              watershedarea:
                type: number
                description: >
                  Area of the watershed associated with the lake, in square kilometers.<br>

                  The watershed area is calculated by deriving and measuring the upstream contribution area to the lake
                  pour point using the HydroSHEDS drainage network map at 15 arc-second resolution.<br>

                  **-9999**: no data as lake pour point is not on HydroSHEDS landmask
              wkt_shape:
                type: string
                description: |
                  A Well-Known-Text representation of the lake, resolved to the appropriate precision.
