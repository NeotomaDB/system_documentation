paths:
  /v1.5/apps/DatasetTypes:
    get:
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/datasetTypes'
          description: Returns the set of `datasettypes` supported by Neotoma.
      tags:
        - Database tables
        - v1.5
  /v1.5/apps/TaxaInDatasets:
    get:
      description: 'The set of all `taxa`, and a list of all the datasets in which each taxon appears.'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/taxaInDatasetsv1_5'
          description: An array of taxon identities with associated dataset IDs.
      summary: Lists all Neotoma taxa (alphebetically) and the dataset types in which the taxa appear.
      tags:
        - Taxonomic metadata
        - v1.5
  /v1.5/apps/collectionTypes:
    get:
      operationId: getCollTypes
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/collectiontyperesponse'
          description: Returns the set of collectiontypes recorded in Neotoma.
      summary: Return the list of collection types.
      tags:
        - Database tables
        - v1.5
  '/v1.5/data/contacts/{contactid}':
    get:
      description: Returns researcher contact information associated with a record.
      parameters:
        - description: Unique contact identifier.
          in: path
          name: contactid
          required: true
          schema:
            format: int64
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/contactresponsev15'
          description: Contact
      summary: Contact information for Neotoma contributors.
      tags:
        - Contact metadata
        - v1.5
  '/v1.5/data/datasets/{datasetid}':
    get:
      description: Returns information about Neotoma dataset
      parameters:
        - $ref: '#/components/parameters/datasetidPath'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
          description: An array of datasets.
      summary: Dataset information.
      tags:
        - Dataset metadata
        - v1.5
  '/v1.5/data/downloads/{datasetid}':
    get:
      description: Returns the named Neotoma Database table.
      parameters:
        - $ref: '#/components/parameters/datasetidPath'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/downloadv1point5'
          description: Returned download object.
      summary: Returns the named Neotoma Database table.
      tags:
        - Data download
        - v1.5
  /v1.5/data/geopoliticalunits:
    get:
      parameters:
        - $ref: '#/components/parameters/gpidQuery'
        - $ref: '#/components/parameters/gpnameQuery'
        - $ref: '#/components/parameters/rankQuery'
        - $ref: '#/components/parameters/lowergpQuery'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/geopoliticalv1_5'
          description: An array of geopolitical units.
      summary: Returns information about geopolitical units.
      tags:
        - Geopolitical metadata
        - v1.5
  '/v1.5/data/geopoliticalunits/{gpid}':
    get:
      parameters:
        - $ref: '#/components/parameters/gpidPath'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/geopolitical'
          description: An array of geopolitical units.
      summary: Returns information about geopolitical units.
      tags:
        - Geopolitical metadata
        - v1.5
  '/v1.5/data/occurrence/{occurrenceid}':
    get:
      description: >-
        Given a unique occurrence identifier associated with a unique occurrence in Neotoma, return individual
        occurrence information for the sample.
      parameters:
        - $ref: '#/components/parameters/occurrenceidPath'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/occurrencev1_5'
          description: A single occurrence object.
      summary: Occurrence information for a taxon and sample.
      tags:
        - Occurrence metadata
        - v1.5
  '/v1.5/data/sites/{siteid}':
    get:
      description: Returns information about Neotoma publications
      parameters:
        - $ref: '#/components/parameters/siteidPath'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sitesv1point5'
          description: An array of site elements.
      summary: Site information.
      tags:
        - Site metadata
        - v1.5
  '/v1.5/dbtables/{table}':
    get:
      description: Returns the named Neotoma Database table.  An empty query returns a list of all Neotoma tables.
      parameters:
        - description: Neotoma database table name.
          example: geochrontypes
          in: path
          name: table
          required: true
          schema:
            example: agetypes
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  data:
                    $ref: '#/components/schemas/dbtablesv1_5'
                  message:
                    $ref: '#/components/schemas/message'
                  status:
                    $ref: '#/components/schemas/status'
                  success:
                    $ref: '#/components/schemas/success'
                type: object
          description: Returned table.
      summary: Returns the named Neotoma Database table.
      tags:
        - Database tables
        - v1.5
  /v2.0/apps/depenvt:
    get:
      parameters:
        - $ref: '#/components/parameters/siteidQuery'
        - $ref: '#/components/parameters/datasetidQuery'
        - $ref: '#/components/parameters/collectionunitidQuery'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/depenvbyid'
          description: This returns the information about depositional environment for selected dataset/collention unit/site.
      tags:
        - v2.0
        - depositional environment
  /v2.0/apps/constdb:
    get:
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/constdbresponse'
          description: >-
            Returns metadata about each [constituent database](https://www.neotomadb.org/data/constituent-databases) in
            Neotoma, including Summary Information about dataset types within the database and the age spans of the
            records in the database. Constituent databases 
      tags:
        - Database metadata
        - Summary Informationrmation
        - v2.0
  /v2.0/apps/constdb/datasetages:
    get:
      parameters:
        - $ref: '#/components/parameters/dbidQuery'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/datasetagerangeresponse'
          description: >
            Returns an ordered array (from earliest to latest) of upload counts by month (YYYY/MM/DD; all days as 01).
            Months with no uploads are excluded.
      tags:
        - Dataset metadata
        - Summary Information
        - v2.0
  /v2.0/apps/constdb/datasetuploads:
    get:
      parameters:
        - $ref: '#/components/parameters/dbidQuery'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/datasetuploadresponse'
          description: >
            Returns an ordered array (from earliest to latest) of upload counts by month (YYYY/MM/DD; all days as 01).
            Months with no uploads are excluded.
      tags:
        - Dataset metadata
        - Summary Information
        - v2.0
  /v2.0/apps/constdb/datasets:
    get:
      parameters:
        - $ref: '#/components/parameters/dbidQuery'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/datasetsShort'
          description: >
            Returns the set of datasets contained within a constituent database, identified by the constituent database
            identifier. Used for quick landing page generation.
      tags:
        - Dataset metadata
        - v2.0
  /v2.0/apps/authorpis:
    get:
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/authorpiresponse'
          description: A table of Neotoma collection types.
      tags:
        - Collection units
        - v2.0
  /v2.0/apps/collectiontypes:
    get:
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/collectiontyperesponse'
          description: A table of Neotoma collection types.
      tags:
