site_name: Neotoma System Documentation
site_description: Comprehensive documentation for the Neotoma database and infrastructure
site_author: Simon J. Goring
site_url: https://open.neotomadb.org/system_documentation

repo_url: https://github.com/NeotomaDB/system_documentation
repo_name: NeotomaDB/system_documentation

theme:
  name: material
  font:
    code: 
  palette:
    # Light mode
    - scheme: default
      primary: grey
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: grey
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - tags
  - autorefs
  - mermaid2
  - bibtex:
      bib_file: "docs/assets/references.bib"
  - privacy
  - awesome-pages
  - macros:
      module_name: docs/macros
      include_dir: docs
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
  - swagger-ui-tag

markdown_extensions:
  - toc:
      permalink: '#'
      separator: "_"
  - footnotes
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Database:
      - Introduction: database/index.md
      - Neotoma Database History: database/neotoma_history.md
      - Design Concepts: database/design_concepts.md
      - Connecting to Neotoma: database/connection.md
      - Table Overview: database/overview.md
  - API:
      - Overview: api/index.md
      - Quick Start: api/quickstart.md
      - Authentication: api/authentication.md
      - Endpoints by Table: api/endpoints/by-table.md
  - AWS Infrastructure: aws/index.md
  - Runbooks: runbooks/index.md
  - Reports: reports/data_quality_report.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/NeotomaDB

watch:
  - docs/macros.py